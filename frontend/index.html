<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xvert - Next Gen File Conversion</title>
  <!-- TEMPORARY ERROR CATCHER -->
  <script>
    window.addEventListener('error', function(e) {
      fetch('http://localhost:8002', {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: e.error ? e.error.stack : (e.message || 'Unknown error')
      }).catch(console.error);
    });
  </script>
  <script type="text/javascript" src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="%VITE_DROPBOX_APP_KEY%"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
